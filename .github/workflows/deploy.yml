# .github/workflows/deploy.yml
# Кладіть цей файл у: .github/workflows/deploy.yml

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Script URL into index.html
        run: |
          sed -i 's|SCRIPT_URL_PLACEHOLDER|${{ secrets.SCRIPT_URL }}|g' index.html
          echo "✅ Script URL injected"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,*.gs,*.md'
